# Docker Swarm stack — pure swarm semantics (no `profiles:`, external secrets,
# placement constraints).
#
# Deploy with:
#   docker stack deploy -c deploy/stack.swarm.yml aicoopdb
#
# Pre-requisites:
#   docker secret create aicoopdb_postgres_password -
#   docker secret create aicoopdb_restic_password -
#   docker network create --driver overlay --attachable ai-coop-db_frontend
#   docker network create --driver overlay --internal ai-coop-db_backend
#
# Single-node by default. For multi-node deployments use placement constraints
# to pin postgres to a single host with persistent storage.

version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: aicoopdb_owner
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: aicoopdb
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend
    secrets:
      - source: aicoopdb_postgres_password
        target: postgres_password
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any

  api:
    image: ghcr.io/fheinfling/ai-coop-db-server:latest
    environment:
      AICOOPDB_HTTP_ADDR: ":8080"
      AICOOPDB_DATABASE_URL: "postgres://aicoopdb_gateway@postgres:5432/aicoopdb?sslmode=disable"
      AICOOPDB_MIGRATIONS_DATABASE_URL: "postgres://aicoopdb_owner@postgres:5432/aicoopdb?sslmode=disable"
      AICOOPDB_LOG_FORMAT: "json"
      AICOOPDB_METRICS_ENABLED: "true"
    networks:
      - frontend
      - backend
    secrets:
      - source: aicoopdb_postgres_password
        target: postgres_password
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        order: start-first
      restart_policy:
        condition: any

volumes:
  postgres-data:

networks:
  frontend:
    external: true
    name: ai-coop-db_frontend
  backend:
    external: true
    name: ai-coop-db_backend

secrets:
  aicoopdb_postgres_password:
    external: true
  aicoopdb_restic_password:
    external: true
