name: release-binaries

on:
  push:
    tags: ["v*"]

permissions: {}

jobs:
  build:
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64, ext: "" }
          - { goos: linux,   goarch: arm64, ext: "" }
          - { goos: darwin,  goarch: amd64, ext: "" }
          - { goos: darwin,  goarch: arm64, ext: "" }
          - { goos: windows, goarch: amd64, ext: ".exe" }
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26.2"

      - name: build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          COMMIT="$(git rev-parse --short HEAD)"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          MODULE="github.com/fheinfling/agentic-coop-db"
          LDFLAGS="-s -w \
            -X ${MODULE}/internal/version.Version=${VERSION} \
            -X ${MODULE}/internal/version.Commit=${COMMIT} \
            -X ${MODULE}/internal/version.BuildDate=${BUILD_DATE}"

          go build -trimpath -ldflags "${LDFLAGS}" \
            -o "agentic-coop-db-mcp${{ matrix.ext }}" ./cmd/mcp

      - name: archive
        run: |
          NAME="agentic-coop-db-mcp-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${NAME}.zip" "agentic-coop-db-mcp${{ matrix.ext }}"
          else
            tar czf "${NAME}.tar.gz" "agentic-coop-db-mcp${{ matrix.ext }}"
          fi

      - name: upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" *.tar.gz *.zip --clobber 2>/dev/null || true

  checksums:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release download "${{ github.ref_name }}" --dir assets

      - name: generate checksums
        run: cd assets && sha256sum * > checksums.txt

      - name: upload checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "${{ github.ref_name }}" assets/checksums.txt --clobber
