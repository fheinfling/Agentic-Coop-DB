    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
  - package-ecosystem: pip
    directory: /clients/python
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
